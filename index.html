<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Wisely</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            z-index: 1;
        }

        .question {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: fadeIn 1s ease-in;
        }

        .buttons {
            display: flex;
            gap: 80px;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 200px;
        }

        .btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            position: relative;
        }

        .btn-yes {
            background: #4CAF50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.6);
        }

        .btn-no {
            background: #f44336;
            color: white;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
            position: absolute;
            transition: all 0.2s ease-out;
        }

        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .celebration.active {
            display: flex;
        }

        .celebration h1 {
            font-size: 4rem;
            color: #ff4081;
            animation: bounce 1s infinite;
            margin-bottom: 20px;
        }

        .celebration p {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 30px;
        }

        .heart {
            font-size: 5rem;
            animation: heartbeat 1s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 2rem;
            animation: floatUp 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="hearts"></div>

    <div class="container">
        <h1 class="question">Will you be my girlfriend? <span style="color:#ff4081;">&hearts;</span></h1>
        
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn" onclick="sayYes()">Yes</button>
            <button class="btn btn-no" id="noBtn" onmouseover="runAway()" onclick="catchMe()">No</button>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <div class="heart" style="color:#ff4081;">&hearts;</div>
        <h1>Yay! I knew it!</h1>
        <p>You made the right choice! (Well, the only choice...)</p>
        <button class="btn btn-yes" onclick="reset()">Play Again</button>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const celebration = document.getElementById('celebration');

        function createHearts() {
            const container = document.getElementById('hearts');
            const heartSymbols = ['&hearts;', '&diams;', '&spades;', '&clubs;'];
            const colors = ['#ff4081', '#e91e63', '#f44336', '#ff5722'];
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (8 + Math.random() * 6) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(heart);
            }
        }
        createHearts();

        function runAway() {
            const btnRect = noBtn.getBoundingClientRect();
            const maxX = window.innerWidth - btnRect.width - 20;
            const maxY = window.innerHeight - btnRect.height - 20;
            
            let newX = Math.random() * maxX;
            let newY = Math.random() * maxY;
            
            const yesRect = yesBtn.getBoundingClientRect();
            const distance = Math.sqrt(
                Math.pow(newX - yesRect.left, 2) + 
                Math.pow(newY - yesRect.top, 2)
            );
            
            if (distance < 150) {
                newX = window.innerWidth / 2 + Math.random() * (window.innerWidth / 2 - btnRect.width - 20);
                newY = Math.random() * maxY;
            }
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
            noBtn.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
        }

        function catchMe() {
            runAway();
        }

        function sayYes() {
            celebration.classList.add('active');
            launchConfetti();
        }

        function reset() {
            celebration.classList.remove('active');
            noBtn.style.position = '';
            noBtn.style.left = '';
            noBtn.style.top = '';
            noBtn.style.transform = '';
            noBtn.textContent = 'No';
        }

        function launchConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 100; i++) {
                setTimeout(function() {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.width = '10px';
                    confetti.style.height = '10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-10px';
                    confetti.style.zIndex = '101';
                    confetti.style.borderRadius = '50%';
                    document.body.appendChild(confetti);
                    
                    const duration = 2000 + Math.random() * 2000;
                    confetti.animate([
                        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                        { transform: 'translateY(' + (window.innerHeight + 20) + 'px) rotate(' + (Math.random() * 720) + 'deg)', opacity: 0 }
                    ], {
                        duration: duration,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    }).onfinish = function() { confetti.remove(); };
                }, i * 30);
            }
        }

        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            runAway();
        });
    </script>
</body>
</html>
